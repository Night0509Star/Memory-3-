<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- SPARSAM STJÄRNBAKGRUND -->
  <div id="stars"></div>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>Memory Card Game</h1>
    <p>Choose your mode:</p>

    <button id="normal-btn">Normal Game</button>
    <button id="timed-btn">Timed Game</button>

    <div class="settings">
      <p>Game settings:</p>

      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="60">Easy (60s)</option>
        <option value="45">Medium (45s)</option>
        <option value="30">Hard (30s)</option>
      </select>

      <label for="card-count">Number of cards:</label>
      <select id="card-count">
        <option value="6">6 pairs</option>
        <option value="8">8 pairs</option>
        <option value="10">10 pairs</option>
      </select>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" style="display: none;">
    <p id="status">Find all matching pairs!</p>

    <p id="timer" style="display: none;">
      Time: <span id="time">60</span>s
    </p>

    <div id="game-board"></div>

    <button id="restart-button">Restart game</button>
    <button id="back-button">Back to menu</button>
  </div>

  <!-- Confetti -->
  <div id="confetti-container"></div>

  <div id="deck-container"></div>

  <script src="script.js"></script>
</body>
</html>
